  test:
    coverage_target: 0.95
    accessibility_audit: "WCAGAAA_AUTO"
  deploy:
    strategy: "CANARY_OFFLINE_FIRST"
    rollback: "FORWARD_COMPATIBLE_ONLY" # No downgrades

workflows:
  erm_chain:
    - "SENSE: Skill/Artifact Ingestion"
    - "MODEL: Graph/Gap Analysis"
    - "OPTIMIZE: Curriculum/Schedule"
    - "TREATY: FPIC/Consent Check"
    - "ACT: Unlock/Display"
    - "LOG: ALN-Blockchain Commit"
    - "INTERFACE: Citizen Dashboard"

metrics:
  offline_capacity: "72_HOURS_MINIMUM"
  response_time_ms: 50
  sovereignty_score: 100
  accessibility_score: 100
