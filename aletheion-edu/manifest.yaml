compliance:
  accessibility:
    standard: "WCAG_2.2_AAA"
    validation: "AUTOMATED_PER_BUILD"
  sovereignty:
    indigenous_rights: "FPIC_REQUIRED"
    data_residency: "ARIZONA_JURISDICTION"
