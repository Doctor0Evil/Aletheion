# Purpose: Resolve Workflow Index entries to CI job graphs (Aletheion)

name: ALE-CI-COMPOSITE-MAPPING-001

on:
  push:
    paths:
      - "registry/workflows/ALE-WORKFLOW-INDEX-001.json"
      - ".github/workflows/ci-composite-mapping.yml"
  workflow_dispatch: {}

env:
  ALETHEION_INDEX_VERSION: "1.0.0"
  ALETHEION_CI_MAPPING_VERSION: "3.0"

jobs:
  build-matrix:
    name: Build Composite CI Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.mk.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: mk
        run: |
          INDEX="registry/workflows/ALE-WORKFLOW-INDEX-001.json"
          if [ ! -f "$INDEX" ]; then echo "Missing $INDEX"; exit 1; fi
          node - << 'EOF' > /tmp/matrix.json
          const fs=require('fs');
          const idx=JSON.parse(fs.readFileSync('registry/workflows/ALE-WORKFLOW-INDEX-001.json','utf8'));
          const shared=[
            {name: 'ci-compliance-preflight.yml', triggers:['ALE-WF-001','ALE-WF-002','ALE-WF-003','ALE-WF-006','ALE-WF-019','ALE-WF-024'], priority:'Critical', blocks:true, manual:false},
            {name: 'ci-fpic-check.yml',           triggers:['ALE-WF-008','ALE-WF-020'],                                               priority:'Critical', blocks:true, manual:true},
            {name: 'ci-neuro-guard.yml',          triggers:['ALE-WF-003','ALE-WF-019','ALE-WF-022'],                                  priority:'Critical', blocks:true, manual:false}
          ];
          const specific=[
            {wf:'ALE-WF-024', primary:'ci-grievance-file.yml', secondary:['ci-compliance-preflight.yml','ci-ledger-append.yml'], parallel:false},
            {wf:'ALE-WF-008', primary:'ci-water-optimize.yml', secondary:['ci-fpic-check.yml','ci-compliance-preflight.yml'],     parallel:true}
          ];
          const byId={}; (idx.workflows||[]).forEach(w=>byId[w.aletheion_id]=w);
          const out=[];
          Object.keys(byId).forEach(id=>{
            const wf=byId[id];
            const spec=specific.find(s=>s.wf===id);
            const sJobs=shared.filter(s=>s.triggers.includes(id));
            const primary=spec?spec.primary:null;
            const secondary=spec?spec.secondary:[];
            const all=new Set();
            sJobs.forEach(s=>all.add(s.name));
            secondary.forEach(n=>all.add(n));
            if(primary) all.add(primary);
            if(!all.size) return;
            const manual=sJobs.some(s=>s.manual);
            const blocks=sJobs.some(s=>s.blocks);
            out.push({
              aletheion_id:id,
              name:wf.name||id,
              primary_job:primary,
              ci_jobs:Array.from(all),
              parallel:spec?!!spec.parallel:true,
              requires_manual_approval:manual,
              blocks_deploy:blocks
            });
          });
          process.stdout.write(JSON.stringify({include:out}));
          EOF
          echo "matrix=$(cat /tmp/matrix.json)" >> "$GITHUB_OUTPUT"

  gate-fpic:
    name: FPIC Manual Gate
    runs-on: ubuntu-latest
    needs: build-matrix
    if: ${{ contains(needs.build-matrix.outputs.matrix, '"requires_manual_approval":true') }}
    steps:
      - name: Await External FPIC Approval
        run: |
          echo "FPIC approval required; integrate with tribal authority channel here."
          # Placeholder: wire to external approval mechanism per jurisdiction.

  run-composite:
    name: Run Composite CI Workflows
    runs-on: ubuntu-latest
    needs:
      - build-matrix
      - gate-fpic
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Log Plan
        run: |
          echo "Aletheion WF: ${{ matrix.include.aletheion_id }}"
          echo "Jobs: ${{ join(matrix.include.ci_jobs, ', ') }}"
          echo "Primary: ${{ matrix.include.primary_job }} Parallel: ${{ matrix.include.parallel }} Blocks: ${{ matrix.include.blocks_deploy }}"

      - name: Run Primary Job (if mapped)
        if: ${{ matrix.include.primary_job != null && matrix.include.primary_job != '' }}
        uses: ./.github/workflows/${{ matrix.include.primary_job }}
        with:
          aletheion_workflow_id: ${{ matrix.include.aletheion_id }}
        secrets: inherit

      - name: Run Shared / Secondary Jobs
        if: ${{ matrix.include.ci_jobs && join(matrix.include.ci_jobs, '') != '' }}
        run: |
          echo "Shared/secondary jobs are declared in matrix.include.ci_jobs."
          echo "Trigger them via reusable workflows or dispatch from downstream deploy flows."
