name: Aletheion Compliance Preflight

on:
  pull_request:
    paths:
      - "aletheion/**/*.rs"
      - "aletheion/**/*.aln"
      - "aletheion/**/*.lua"
      - "aletheion/**/*.cpp"
      - "aletheion/**/*.kt"
      - "aletheion/**/*.js"
      - "aletheion/**/*.yaml"
  push:
    branches: ["main"]

jobs:
  check-grammar-and-trust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ALN toolchain
        run: |
          echo "Install ALN compiler/validator here"

      - name: Validate canonical workflow grammar
        run: |
          aln-validate aletheion/grammar/workflows/ALE-GRAMMAR-WORKFLOW-CANONICAL-001.aln

      - name: Validate Googolswarm trust schema
        run: |
          yaml-lint aletheion/trust/googolswarm/ALE-TRUST-GOOGOLSWARM-SCHEMA-001.yaml

      - name: Enforce no-untagged workflows
